<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Safety Campaign</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-box">
            <h1>🛡️ Admin Safety Campaign</h1>
            <h2>Login Admin</h2>
            <form id="login-form">
                <div class="form-group">
                    <label for="username">Username:</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" class="btn-primary">Login</button>
                <p class="info">Username: <strong>admin</strong> | Password: <strong>admin123</strong></p>
            </form>
            <p class="back-link"><a href="index.html">← Kembali ke Beranda</a></p>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            if (username === 'admin' && password === 'admin123') {
                localStorage.setItem('admin-login', 'true');
                window.location.href = 'admin-dashboard.html';
            } else {
                alert('Username atau password salah!');
            }
        });
    </script>
</body>
</html>
